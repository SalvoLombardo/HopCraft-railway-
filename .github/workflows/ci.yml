name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # abilita trigger manuale dalla UI GitHub Actions

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff (pyflakes + pycodestyle, ignora lunghezza riga)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.9.0"

      - name: Run ruff
        run: ruff check --select E,F --line-length 150 backend/app backend/tests

  # ---------------------------------------------------------------------------
  # Test — pytest (tutte le dipendenze esterne sono mockate, nessun servizio reale)
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    env:
      # Valori dummy — i test mockano DB e Redis, le chiavi API non vengono usate
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/hopcraft
      DB_PASSWORD: test
      REDIS_URL: redis://localhost:6379/0
      FLIGHT_PROVIDER: amadeus
      LLM_PROVIDER: gemini

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v

